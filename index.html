<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026泰國天燈節 9天8夜精華之旅</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- 更新路徑：指向 src 資料夾下的共用 CSS -->
    <link rel="stylesheet" href="src/shared-theme.css">
</head>
<body>

    <!-- Hero Section (固定部分) -->
    <header class="bg-gradient-to-r from-slate-900 via-indigo-900 to-blue-900 text-white shadow-lg relative overflow-hidden">
        <div class="absolute top-4 left-10 w-3 h-3 bg-amber-300 rounded-full blur-sm opacity-60"></div>
        <div class="absolute top-10 right-20 w-4 h-4 bg-amber-400 rounded-full blur-sm opacity-70"></div>
        <div class="absolute bottom-8 left-1/4 w-2 h-2 bg-yellow-200 rounded-full blur-sm opacity-50"></div>
        <div class="absolute top-1/2 right-1/3 w-3 h-3 bg-orange-300 rounded-full blur-[2px] opacity-80"></div>

        <div class="max-w-5xl mx-auto px-4 py-10 relative z-10 text-center md:text-left">
            <p class="text-amber-400 font-bold tracking-widest text-sm md:text-base mb-2">✦ 跨越雙城的極致探險 ✦</p>
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-wide leading-tight">
                2026 泰國萬人天燈節 <br class="md:hidden">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500">跨城精華之旅</span>
            </h1>
            <p class="text-base md:text-lg font-medium text-indigo-100 opacity-90 flex flex-col md:flex-row items-center justify-center md:justify-start gap-3 md:gap-4">
                <span class="bg-white/10 border border-white/20 px-3 py-1 rounded-full text-amber-200 text-sm shadow-sm backdrop-blur-sm"><i class="fa-regular fa-calendar-days mr-1.5"></i>11/21 - 11/29</span>
                <span class="hidden md:inline text-indigo-400/60">|</span>
                <span>曼谷 ✈️ 芭達亞 🚗 大城 ✈️ 清邁</span>
            </p>
        </div>
    </header>

    <!-- Main Navigation Tabs -->
    <div class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-5xl mx-auto px-4 flex overflow-x-auto hide-scrollbar">
            <button onclick="switchMainTab('overview')" id="tab-overview" class="tab-btn active flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-solid fa-map-location-dot mr-2"></i>行程總覽
            </button>
            <button onclick="switchMainTab('itinerary')" id="tab-itinerary" class="tab-btn flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-regular fa-clock mr-2"></i>每日行程表
            </button>
            <button onclick="switchMainTab('costs')" id="tab-costs" class="tab-btn flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-solid fa-file-invoice-dollar mr-2"></i>費用資訊
            </button>
        </div>
    </div>

    <!-- Content Container (動態載入模組區) -->
    <main class="max-w-5xl mx-auto px-4 py-8" id="content-area">
        <div class="text-center py-20 text-slate-400">
            <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
            <p>正在載入模組...</p>
        </div>
    </main>

    <script>
        // 切換主頁籤：路徑指向 src/ 檔案
        async function switchMainTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            const contentArea = document.getElementById('content-area');
            contentArea.innerHTML = '<div class="text-center py-20 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i><p>載入中...</p></div>';
            
            try {
                // 更新路徑：指向 src/ 目錄
                const response = await fetch(`src/${tabId}.html`);
                if (response.ok) {
                    const html = await response.text();
                    contentArea.innerHTML = `<div class="animate-fade-in">${html}</div>`;
                    
                    if (tabId === 'itinerary') {
                        switchDay(1); // 預設載入 Day 1
                    }
                } else {
                    contentArea.innerHTML = `<div class="p-8 bg-rose-50 text-rose-600 rounded-xl font-bold text-center">載入 src/${tabId}.html 失敗。請檢查檔案位置。</div>`;
                }
            } catch (error) {
                contentArea.innerHTML = `<div class="p-8 bg-rose-50 text-rose-600 rounded-xl font-bold text-center">發生錯誤：請確認是否使用本地伺服器 (Live Server) 開啟。</div>`;
            }
        }

        // 每日行程子頁籤：路徑指向 src/itinerary/ 資料夾
        async function switchDay(dayNum) {
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.style.background = '';
                btn.classList.remove('active', 'text-white', 'border-indigo-800', 'bg-slate-200');
                btn.classList.add('text-slate-600', 'border-slate-100');
            });
            
            const activeBtn = document.getElementById('btn-day' + dayNum);
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-600', 'border-slate-100', 'text-slate-500', 'bg-slate-50');
                activeBtn.classList.add('active');
            }
            
            const dayContentArea = document.getElementById('day-content-area');
            if(!dayContentArea) return;

            dayContentArea.innerHTML = '<div class="text-center py-10 text-slate-400"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';

            try {
                // 更新路徑：指向 src/itinerary/ 子目錄
                const response = await fetch(`src/itinerary/day_${dayNum}.html`);
                if (response.ok) {
                    const html = await response.text();
                    dayContentArea.innerHTML = `<div class="animate-fade-in">${html}</div>`;
                    toggleTransfers(); 
                } else {
                    dayContentArea.innerHTML = `<div class="p-4 text-rose-500 text-center font-bold">載入 src/itinerary/day_${dayNum}.html 失敗</div>`;
                }
            } catch (error) {
                dayContentArea.innerHTML = `<div class="p-4 text-rose-500 text-center">載入失敗，請確認檔案路徑。</div>`;
            }
        }

        function toggleTransfers() {
            const toggleElement = document.getElementById('transfer-toggle');
            if(!toggleElement) return;
            const isChecked = toggleElement.checked;
            document.querySelectorAll('.timeline-item-transfer').forEach(el => {
                isChecked ? el.classList.remove('hidden') : el.classList.add('hidden');
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchMainTab('overview');
        });
    </script>
</body>
</html>
