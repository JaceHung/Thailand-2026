<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026泰國天燈節 9天8夜精華之旅</title>
    
    <!-- Chrome Tab Icon (Favicon) - 採用最具識別度的「金標定位 + 飛機」旅遊圖示 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 2 C10 2 5 7 5 13 C5 21 16 30 16 30 C16 30 27 21 27 13 C27 7 22 2 16 2 Z' fill='%23f59e0b'/><path d='M21 15 L17 14 L17 10 Q17 9 16 9 Q15 9 15 10 L15 14 L11 15 L11 16 L15 15 L15 19 L14 20 L14 21 L16 20.5 L18 21 L18 20 L17 19 L17 15 L21 16 Z' fill='white'/></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- 更新路徑：指向 assets 資料夾下的共用 CSS -->
    <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body>

    <!-- Hero Section (固定部分) -->
    <header class="bg-gradient-to-r from-slate-900 via-indigo-900 to-blue-900 text-white shadow-lg relative overflow-hidden">
        <div class="absolute top-4 left-10 w-3 h-3 bg-amber-300 rounded-full blur-sm opacity-60"></div>
        <div class="absolute top-10 right-20 w-4 h-4 bg-amber-400 rounded-full blur-sm opacity-70"></div>
        <div class="absolute bottom-8 left-1/4 w-2 h-2 bg-yellow-200 rounded-full blur-sm opacity-50"></div>
        <div class="absolute top-1/2 right-1/3 w-3 h-3 bg-orange-300 rounded-full blur-[2px] opacity-80"></div>

        <div class="max-w-5xl mx-auto px-4 py-10 relative z-10 text-center md:text-left">
            <p class="text-amber-400 font-bold tracking-widest text-sm md:text-base mb-2">✦ 跨越雙城的極致探險 ✦</p>
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-wide leading-tight">
                2026 泰國萬人天燈節 <br class="md:hidden">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500">跨城精華之旅</span>
            </h1>
            <div class="flex flex-col md:flex-row items-center justify-center md:justify-between gap-3">
                <p class="text-base md:text-lg font-medium text-indigo-100 opacity-90 flex flex-col md:flex-row items-center justify-center md:justify-start gap-3 md:gap-4">
                    <span class="bg-white/10 border border-white/20 px-3 py-1 rounded-full text-amber-200 text-sm shadow-sm backdrop-blur-sm"><i class="fa-regular fa-calendar-days mr-1.5"></i>11/21 - 11/29</span>
                    <span class="hidden md:inline text-indigo-400/60">|</span>
                    <span>曼谷 ✈️ 芭達亞 🚗 大城 ✈️ 清邁</span>
                </p>
                <span
                    id="last-updated-btn"
                    onclick="handleLastUpdatedClick()"
                    style="cursor:default;user-select:none;"
                    class="text-indigo-300/40 text-xs font-normal tracking-wide"
                >最後更新：2026-04-04</span>
            </div>
        </div>
    </header>

    <!-- Main Navigation Tabs -->
    <div class="bg-white shadow-sm sticky top-0 z-20">
        <div class="max-w-5xl mx-auto px-4 flex overflow-x-auto hide-scrollbar">
            <button onclick="switchMainTab('overview')" id="tab-overview" class="tab-btn active flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-solid fa-map-location-dot mr-2"></i>行程總覽
            </button>
            <button onclick="switchMainTab('itinerary')" id="tab-itinerary" class="tab-btn flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-regular fa-clock mr-2"></i>每日行程表
            </button>
            <button onclick="switchMainTab('costs')" id="tab-costs" class="tab-btn flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-solid fa-file-invoice-dollar mr-2"></i>費用資訊
            </button>
            <button onclick="switchMainTab('private')" id="tab-private" class="tab-btn hidden flex-1 py-4 px-2 text-center whitespace-nowrap text-slate-500 hover:text-indigo-600 transition-colors text-base md:text-lg">
                <i class="fa-solid fa-lock mr-2"></i>私人備忘
            </button>
        </div>
    </div>

    <!-- Content Container (動態載入模組區) -->
    <main class="max-w-5xl mx-auto px-4 py-8" id="content-area">
        <div class="text-center py-20 text-slate-400">
            <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
            <p>正在載入模組...</p>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
</body>
</html>
