<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>行程表模組</title>
</head>
<body>
<div class="flex flex-col md:flex-row gap-6">
    <!-- Day Selector Sidebar -->
    <div class="md:w-1/4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-2 md:sticky md:top-24 flex md:flex-col overflow-x-auto hide-scrollbar gap-1">
            <button onclick="switchDay(1)" id="btn-day1" class="day-btn active flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium transition-all">Day 1 <span class="block text-xs font-normal opacity-80 mt-0.5">11/21 閃耀啟程：直奔芭達亞</span></button>
            <button onclick="switchDay(2)" id="btn-day2" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 2 <span class="block text-xs font-normal opacity-80 mt-0.5">11/22 暹羅匠心：木雕聖殿與秀</span></button>
            <button onclick="switchDay(3)" id="btn-day3" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 3 <span class="block text-xs font-normal opacity-80 mt-0.5">11/23 大城風華：長頸鹿與古蹟</span></button>
            <button onclick="switchDay(4)" id="btn-day4" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 4 <span class="block text-xs font-normal opacity-80 mt-0.5">11/24 曼谷潮魅：象神與泰服</span></button>
            <button onclick="switchDay(5)" id="btn-day5" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 5 <span class="block text-xs font-normal opacity-80 mt-0.5">11/25 雲端漫遊：飛抵清邁天燈</span></button>
            <button onclick="switchDay(6)" id="btn-day6" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 6 <span class="block text-xs font-normal opacity-80 mt-0.5">11/26 清邁古韻：雙龍寺與慢活</span></button>
            <button onclick="switchDay(7)" id="btn-day7" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 7 <span class="block text-xs font-normal opacity-80 mt-0.5">11/27 清邁森呼吸：湖畔與大象</span></button>
            <button onclick="switchDay(8)" id="btn-day8" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 8 <span class="block text-xs font-normal opacity-80 mt-0.5">11/28 清邁趣遊：萌寵與雞籠 SPA</span></button>
            <button onclick="switchDay(9)" id="btn-day9" class="day-btn flex-shrink-0 text-left px-4 py-3 rounded-xl border border-slate-100 font-medium text-slate-600 hover:bg-slate-50 transition-all">Day 9 <span class="block text-xs font-normal opacity-80 mt-0.5">11/29 泰味尾聲：水上市場鐵道</span></button>
        </div>
    </div>

    <!-- Timeline Content Box -->
    <div class="md:w-3/4 bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
        
        <!-- Toggle Switch for Transfers -->
        <div class="flex justify-end mb-4 border-b border-slate-100 pb-4">
            <label class="inline-flex items-center cursor-pointer">
                <input type="checkbox" id="transfer-toggle" class="sr-only peer" onchange="toggleTransfers()">
                <div class="relative w-11 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-500"></div>
                <span class="ms-3 text-sm font-medium text-slate-600 select-none">顯示交通與車程時間</span>
            </label>
        </div>

        <!-- 這裡會由外部 JS 動態載入 day_1.html ~ day_9.html -->
        <div id="day-content-area" class="animate-fade-in">
            <!-- 預設載入佔位符 -->
            <div class="text-center py-10 text-slate-400">
                <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
            </div>
        </div>

    </div>
</div>
</body>
</html>
